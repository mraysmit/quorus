#
# JUnit 5 parallel test execution for quorus-controller.
#
# Parallel is enabled, but BOTH defaults are same_thread (sequential).
# Only docker test classes opt in via @Execution(CONCURRENT):
#   - DockerRaftClusterTest, NetworkPartitionTest, ConfigurableRaftClusterTest
# AdvancedNetworkTest is annotated @Isolated (network mutations).
#
junit.jupiter.execution.parallel.enabled = true
junit.jupiter.execution.parallel.mode.default = same_thread
junit.jupiter.execution.parallel.mode.classes.default = same_thread
