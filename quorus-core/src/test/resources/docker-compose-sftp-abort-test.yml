# Protocol servers for SFTP abort and upload integration testing
# Used by SftpAbortIntegrationTest and SftpUploadIntegrationTest
# via SharedTestContainers singleton pattern

services:
  # SFTP Server for integration testing
  sftp:
    image: atmoz/sftp:alpine
    ports:
      - "0:22"  # Dynamic port allocation by TestContainers
    # Format: username:password:userid:groupid:directory
    # The 'upload' directory is created with correct ownership by the entrypoint
    command: testuser:testpass:1001:100:upload
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 22 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
