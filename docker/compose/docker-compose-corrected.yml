# Quorus Single-Node Development Configuration
# Retained for compatibility with older local workflows.
# This file now starts the controller-first runtime directly.

networks:
  quorus-corrected:
    driver: bridge

services:
  controller:
    build:
      context: ../..
      dockerfile: quorus-controller/Dockerfile
      additional_contexts:
        m2cache: ${M2_REPO}/dev/mars
    container_name: quorus-controller-corrected
    environment:
      - NODE_ID=controller-corrected
      - RAFT_HOST=0.0.0.0
      - RAFT_PORT=8080
      - HTTP_PORT=8080
      - CLUSTER_NODES=controller-corrected=controller:8080
      - ELECTION_TIMEOUT_MS=3000
      - HEARTBEAT_INTERVAL_MS=500
      - JAVA_OPTS=-Xmx512m -Xms256m
    ports:
      - "8080:8080"
    networks:
      - quorus-corrected
    volumes:
      - controller-data:/app/data
      - controller-logs:/app/logs
    labels:
      - "logging=promtail"
      - "service=quorus-controller"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  controller-data:
    driver: local
  controller-logs:
    driver: local
